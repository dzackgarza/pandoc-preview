# The arXiv-ready bundle export target — Phase G / G1 (P114). A DISCOVERED
# export-category plugin, sibling to the shipped pandoc-pdf-export / pandoc-html-
# export plugins, riding the SAME generic export firewall (run_plugin in
# plugins.rs). The app core is unchanged: the whole md->tex->flatten->materialize
# ->tar pipeline IS this plugin's script/argv. The core owns NO pandoc/latexpand/
# tar knowledge.
#
# The bundle the plugin writes to {artifact} is a self-contained .tar.gz that
# compiles to PDF with NO system style files: a single flattened root .tex (every
# \input/\include resolved in by the canonical latexpand flattener, /usr/bin/
# latexpand), the REAL dependent macro tier the document's preamble pulls in
# COPIED into the bundle (the macro file defining the custom \RR), and the
# document's relative resources (figures) copied alongside.
#
# Vendored shipped asset (canonical copy lives here); scripts/install-assets.sh,
# provision-proof.sh and first-run.sh install it into the configured plugins dir
# alongside the other shipped export plugins (OSOT).
id = "arxiv-export"
name = "arXiv bundle"
description = "Exports the document to a self-contained arXiv-ready .tar.gz: pandoc md->tex, latexpand-flattened into one root .tex, with the dependent macros/.sty materialized so it compiles with no system styles."
category = "export"
kind = "command"
# The output extension this export target writes — a GENERIC manifest field the
# menu populator reads. The bundle is a gzip tarball.
extension = "tar.gz"
# JSON Schema (draft 2020-12) for this plugin's [plugin.arxiv-export] config
# section. Referenced, not inlined.
config_schema = "schema.json"
# Input file types this export target handles (the render-matrix `inputs`).
inputs = ["markdown"]

[exec]
# argv with per-element placeholder substitution: {plugin_dir} = this plugin's
# directory, {file} = the real on-disk source path, {artifact} = the app-provided
# output path (the .tar.gz bundle). The core spawns this with cwd = the source
# file's parent, so the document's relative resources (the \input-ed section, the
# figures) resolve natively. The raw pandoc md->tex command and the macros source
# dir arrive on PPE_PLUGIN_CONFIG.
command = ["{plugin_dir}/export.sh", "{file}", "{artifact}"]

# The configurator. The app's "Configure" action SPAWNS this detached; this stub
# is non-interactive (it records the substituted paths so an implementation that
# ignores the manifest cannot fabricate the effect).
[configure]
command = ["{plugin_dir}/configure.sh", "{plugin_dir}", "{config_dir}"]

[[doctor_checks]]
id = "arxiv-export-pandoc"
description = "the configured pandoc md->tex command resolves, is executable, and --version exits 0"
command = ["{plugin_dir}/check-pandoc.sh"]

[[doctor_checks]]
id = "arxiv-export-tools"
description = "the bundle toolchain (latexpand, tar) and the macros source dir resolve"
command = ["{plugin_dir}/check-tools.sh"]
