# The shipped multi-pass PDF export driver — an export-category plugin in the
# pandoc suite (P109 / Phase F / F3). PDF export via latexmk: pandoc renders the
# markdown buffer to standalone LaTeX, then the REAL latexmk binary drives
# lualatex over the emitted .tex. latexmk runs exactly-as-many-passes-as-needed
# and auto-invokes BibTeX by its OWN default behaviour, so a forward
# cross-reference (\eqref to a LATER \label) and a \cite against the bibliography
# BOTH resolve — neither orchestrated by the app or this plugin. The app core owns
# NO pass loop and NO BibTeX knowledge: the deliverable IS this configured driver
# command (its argv resolves to latexmk) plus the [[doctor_checks]] below that
# latexmk resolves.
#
# Vendored shipped asset (the canonical copy lives here); scripts/provision-proof.sh
# and first-run.sh install it into the configured plugins dir alongside the
# pandoc-renderer / pandoc-pdf-export plugins (OSOT).
#
# BUILD ISOLATION (F2/P108) is the plugin's own: latexmk's native
# -output-directory={builddir} routes EVERY intermediate (.aux/.bbl/.fls/.log/.out/
# .fdb_latexmk and the build .pdf) into the app-supplied per-run build dir, while
# the driver runs with cwd = the SOURCE FILE'S PARENT so the document's relative
# resources (\input, \includegraphics) and the config-declared bibliography
# resolve natively at compile time. The app core injects NO TeX env var and does
# NOT cwd into the build dir — the engine-isolation lever lives HERE, in the
# plugin, not in the build-engine-agnostic core.
#
# It carries its OWN independent raw pandoc command (markdown -> standalone latex)
# delivered on PPE_PLUGIN_CONFIG; export.sh shlex-tokenizes and runs it verbatim
# to produce the .tex, then drives latexmk over it (run, not interpret). The
# produced PDF is copied from the build dir to the app-chosen {artifact}.
id = "latexmk-pdf-export"
name = "PDF (latexmk multi-pass)"
description = "Exports the document to PDF via pandoc (markdown->latex) then the real latexmk driver (auto multi-pass + auto-BibTeX); the shipped reference-resolving PDF export."
category = "export"
kind = "command"
# The output file extension this export target writes — a GENERIC manifest field
# on the export-category plugin, read by the menu populator.
extension = "pdf"
# JSON Schema (draft 2020-12) for this plugin's [plugin.latexmk-pdf-export]
# config section. Referenced, not inlined.
config_schema = "schema.json"
# Input file types this export target handles (the render-matrix `inputs`).
inputs = ["markdown"]

[exec]
# argv with per-element placeholder substitution: {plugin_dir} = this plugin's
# directory, {file} = the real on-disk source path, {artifact} = the app-provided
# output path, {builddir} = the app-supplied per-run isolated build directory
# (F2/P108). The app SUPPLIES the build path; this plugin's driver routes
# latexmk's intermediates into it via latexmk's own native -output-directory flag.
# The spawn cwd is the source file's parent, so the source's relative resources
# and the config-declared bibliography resolve natively. The raw pandoc
# markdown->latex command arrives on PPE_PLUGIN_CONFIG as {"command": "..."}.
command = ["{plugin_dir}/export.sh", "{file}", "{artifact}", "{builddir}"]

# The PDF export configurator. The app's "Configure" action SPAWNS this detached;
# this stub is non-interactive (it records the substituted paths so an
# implementation that ignores the manifest cannot fabricate the effect).
[configure]
command = ["{plugin_dir}/configure.sh", "{plugin_dir}", "{config_dir}"]

# The multi-pass driver this plugin runs IS the real latexmk binary; latexmk is
# the hard dependency that makes as-many-passes-as-needed + auto-BibTeX work. This
# check resolves the SAME driver argv[0] (latexmk) export.sh spawns and confirms
# it is an executable that `-v` exits 0 on — fails loudly if absent.
[[doctor_checks]]
id = "latexmk-pdf-export-driver"
description = "the multi-pass driver latexmk resolves, is executable, and -v exits 0"
command = ["{plugin_dir}/check-latexmk.sh"]

# The plugin's export driver script is present and executable.
[[doctor_checks]]
id = "latexmk-pdf-export-runnable"
description = "latexmk-pdf-export export.sh is present and executable"
command = ["test", "-x", "{plugin_dir}/export.sh"]
