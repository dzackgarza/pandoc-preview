# The shipped HTML export target — an export-category plugin in the pandoc suite.
# Export-as-plugin migration (export-plugins-contract.md; proof-obligations.md
# migration rulings 2026-06-17): HTML export is a DISCOVERED export-category
# plugin, exactly as rendering already moved to the pandoc-renderer plugin. The
# app core owns NO pandoc/export command knowledge — the export flags
# (--standalone --embed-resources for a self-contained artifact; the plugin-local
# MathJax bundle) live INSIDE this plugin's command, never in core.
#
# Vendored shipped asset (the canonical copy lives here); scripts/provision-proof.sh
# and first-run.sh install it into the configured plugins dir alongside the
# pandoc-renderer plugin (OSOT).
#
# It carries its OWN independent raw pandoc command (richness ruling 2,
# 2026-06-17): the [plugin.pandoc-html-export].command STRING is delivered on
# PPE_PLUGIN_CONFIG and export.sh shlex-tokenizes and runs it verbatim, layering
# only the volatile per-export context (the local MathJax asset, the {file}/
# {artifact} paths). The output file extension ("html") is a GENERIC manifest
# field the menu populator reads (ruling 4).
id = "pandoc-html-export"
name = "HTML"
description = "Exports the document to a self-contained HTML artifact via pandoc; the shipped default HTML export."
category = "export"
kind = "command"
# The output file extension this export target writes — a GENERIC manifest field
# on the export-category plugin, read by the menu populator (ruling 4).
extension = "html"
# JSON Schema (draft 2020-12) for this plugin's [plugin.pandoc-html-export]
# config section. Referenced, not inlined.
config_schema = "schema.json"
# Input file types this export target handles (the render-matrix `inputs`).
inputs = ["markdown"]

[exec]
# argv with per-element placeholder substitution: {plugin_dir} = this plugin's
# directory, {file} = the real on-disk source path, {artifact} = the app-provided
# output path. The real buffer is also on stdin (pandoc reads {file} from disk so
# document-relative resources, e.g. fig/plot.png, resolve and embed). The raw
# pandoc command arrives on PPE_PLUGIN_CONFIG as {"command": "..."}.
command = ["{plugin_dir}/export.sh", "{file}", "{artifact}"]

# The HTML export configurator. The app's "Configure" action SPAWNS this detached;
# this stub is non-interactive (it records the substituted paths so an
# implementation that ignores the manifest cannot fabricate the effect).
[configure]
command = ["{plugin_dir}/configure.sh", "{plugin_dir}", "{config_dir}"]

[[doctor_checks]]
id = "html-export-executable"
description = "configured pandoc resolves, is executable, and --version exits 0"
command = ["{plugin_dir}/check-executable.sh"]

[[doctor_checks]]
id = "html-export-runnable"
description = "the HTML export command runs (empty stdin) and exits 0"
command = ["{plugin_dir}/check-invocation.sh"]
