# The pandoc renderer — houses ALL pandoc preview knowledge that used to live in
# the app core (render.rs). It is a renderer plugin: render context
# ({base_dir}/{base_url}/{mathjax}) on argv, the markdown buffer on stdin,
# standalone HTML on stdout. Milestone C: its config ([plugin.pandoc-renderer]) is
# the RAW pandoc command STRING (canonical), delivered on PPE_PLUGIN_CONFIG as
# {"command": "..."}; render.sh shlex-tokenizes and runs it verbatim, layering the
# volatile render context. It also contributes the pandoc-executable /
# pandoc-invocation doctor checks that left the core (doctor-contract.md).
#
# Vendored shipped asset: the canonical copy lives in
# src-tauri/resources/vendor/plugins/pandoc-renderer. scripts/first-run.sh installs
# it into the configured XDG plugins dir (a managed symlink), so a freshly
# configured system is doctor-clean with the renderer already discoverable.
id = "pandoc-renderer"
name = "Pandoc Renderer"
description = "Renders markdown to preview HTML via pandoc; the shipped default renderer."
category = "renderer"
kind = "command"
config_schema = "schema.json"

[exec]
# Render context on argv; the markdown buffer arrives on stdin; HTML on stdout.
# {bibliography}/{csl} are the config-owned citation sources (P84/C1) the app
# forwards from config.editor.bibliography / .csl; render.sh layers them onto the
# pandoc command as --bibliography / --csl (exactly as it layers --mathjax).
# {tikzstyles}/{tikzdefs} are the config-owned shared figure palette (Phase D /
# D-2 / P91) the app forwards from config.figures.tikzstyles / .tikzdefs; render.sh
# exports them as TIKZSTYLES_FILE / TIKZDEFS_FILE for tikzcd.lua to \input into
# every compiled figure.
command = ["{plugin_dir}/render.sh", "{base_dir}", "{base_url}", "{mathjax}", "{bibliography}", "{csl}", "{tikzstyles}", "{tikzdefs}"]

# The pandoc configurator (C3): the app spawns this (detached) as the "Configure"
# action; it opens a kitty popup running a gum wizard that edits the raw pandoc
# command and locks the required filters in. The app knows nothing of kitty/gum.
[configure]
command = ["{plugin_dir}/configure.sh", "{config_dir}"]

[[doctor_checks]]
id = "pandoc-executable"
description = "configured pandoc resolves, is executable, and --version exits 0"
command = ["{plugin_dir}/check-executable.sh"]

[[doctor_checks]]
id = "pandoc-invocation"
description = "the canonical pandoc command runs (empty stdin) and exits 0"
command = ["{plugin_dir}/check-invocation.sh"]

[[doctor_checks]]
id = "required-filter"
description = "all required HTML-preview filters are present in ~/.pandoc/filters"
command = ["{plugin_dir}/check-required-filters.sh"]

[[doctor_checks]]
id = "pandoc-resource-path"
description = "the global figures resource dir (PANDOC_RESOURCE_PATH) is set and exists"
command = ["{plugin_dir}/check-resource-path.sh"]

[[doctor_checks]]
id = "tikz-toolchain"
description = "the tikz->SVG compile toolchain (pdflatex + pdf2svg, required by tikzcd.lua) resolves"
command = ["{plugin_dir}/check-tikz-toolchain.sh"]
