# The reveal.js slides renderer (Phase F / F6 / P113) — a renderer plugin SIBLING
# of pandoc-renderer whose ONLY difference is the pandoc WRITER: `--to revealjs`
# (with `--embed-resources` as a flag) instead of `--to html5`. Slides are "just a
# different pandoc command with reveal.js
# output" (feature-catalogue Tier-2): pandoc's own revealjs writer emits the deck
# structure (`<div class="reveal"><div class="slides"><section>…`) — this fixture
# builds NO slide renderer, it runs pandoc's. F6's app-core job is to wire THIS
# renderer plugin into F1's compile-on-idle scheduler so editing re-renders the
# deck into the preview iframe (the fast HTML path), distinct from a beamer->PDF
# compile.
#
# (For B/F this lives as a SPEC-OWNED proof fixture installed into the hermetic
# plugins dir, the sibling shape of the generic-renderer fixture; the shipped
# vendored copy is the app's concern, not the test's.)
id = "revealjs-renderer"
name = "Reveal.js Slides Renderer"
description = "Renders markdown to a reveal.js slide deck via pandoc -t revealjs; the slides fast-feedback preview renderer."
category = "renderer"
kind = "command"
config_schema = "schema.json"

[exec]
# Render context placeholders ({base_dir}/{base_url}/{mathjax}) are available; the
# markdown buffer arrives on stdin and the reveal.js deck HTML leaves on stdout.
command = ["{plugin_dir}/render.sh", "{base_dir}", "{base_url}", "{mathjax}"]

# Required since C1 (every plugin declares a configure command). The slides
# renderer's only config is its raw pandoc command; no interactive configurator
# ships, so this is a no-op placeholder. Never spawned by any spec.
[configure]
command = ["true"]
