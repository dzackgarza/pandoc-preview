# Generic-plugin fixture (Milestone A). NOT an export plugin: it is an arbitrary
# "tools"-category plugin discovered from the plugins dir and invoked by id, to
# prove the generic plugin firewall (1) runs a plugin's configured argv against
# the REAL editor buffer and surfaces a structured PluginResult (A1/p19), (2) has
# its [plugin.witness-tool] config section validated against the schema declared
# here by the SAME generic validator the core uses (A2/d08), and (3) contributes
# its doctor checks into the one battery (A3/d09).
#
# JSON Schema lives in JSON (schema.json), referenced from TOML here — never
# inlined. Manifest shape is the Milestone A plugin contract.
id = "witness-tool"
name = "Witness Tool"
description = "Emits a witness derived from the real buffer (heading + sha256)."
category = "tools"
kind = "command"
# JSON Schema (draft 2020-12) for this plugin's [plugin.witness-tool] config
# section. Referenced, not inlined. Top-level scalar keys must precede any table
# header in TOML, so this sits above [exec].
config_schema = "schema.json"

[exec]
# argv with per-element placeholder substitution: {plugin_dir} = this plugin's
# directory, {file} = the real on-disk source path of the open buffer,
# {artifact} = the app-provided output path. The real buffer is also on stdin.
command = ["{plugin_dir}/run.sh", "{file}", "{artifact}"]

# Self-owned configure command (C1/p22). The app's "Configure" action SPAWNS this
# (detached) with {plugin_dir}/{config_dir} substituted. A real plugin brings up
# its own config UI (pandoc opens a kitty popup running gum); this fixture writes a
# witness into the config dir carrying the substituted paths, proving the app
# resolved the plugin by id and spawned its configure command with real context.
[configure]
command = ["{plugin_dir}/configure.sh", "{plugin_dir}", "{config_dir}"]

# Doctor checks this plugin contributes to the one battery (A3). Each declares a
# stable id, a human description, and a command whose exit status is the check:
# exit 0 -> OK, nonzero -> FAIL. {plugin_dir}/{config_dir} are substituted.
[[doctor_checks]]
id = "witness-tool-runnable"
description = "witness-tool run.sh is present and executable"
command = ["test", "-x", "{plugin_dir}/run.sh"]

[[doctor_checks]]
id = "witness-tool-marker"
description = "witness-tool activation marker present in the config dir"
command = ["test", "-f", "{config_dir}/witness-tool.marker"]
